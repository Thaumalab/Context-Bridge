<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>ShiftLab // Context Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

/* [FOUNDER ADDITION] Ghost Background Pulse */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" fill="none" stroke="rgba(26,24,20,0.03)" stroke-width="1"><path d="M0,250 L100,220 L200,240 L300,180 L400,200 L500,120 L600,150 L700,80 L800,100 L900,30 L1000,50" /></svg>');
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  z-index: -1;
  animation: ghostPulse 10s infinite ease-in-out;
  pointer-events: none;
}
@keyframes ghostPulse {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.02); }
}

:root {
  --sand:#fdfdfc;--sand2:#f5f2ed;--sand3:#ede9e2;--sand4:#d4cec4;
  --ink:#1a1814;--ink2:#3d3a35;--ink3:#6b6760;--ink4:#9e9b96;
  --rust:#c4622d;--rust-l:#f0ddd3;
  --teal:#2d7a6b;--teal-l:#d4ede8;
  --amber:#a87c2a;--amber-l:#f5ead6;
  --red:#b03a2e;--red-l:#f5ddd9;
  --border:rgba(26,24,20,0.1);--border2:rgba(26,24,20,0.18);
  --sans:'Inter',system-ui,sans-serif;
  --serif:'Lora',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--sand);color:var(--ink);font-family:var(--sans);line-height:1.6;min-height:100vh;overflow-x:hidden}

/* Z-Index Logic */
.topbar{background:var(--sand);border-bottom:1px solid var(--border2);padding:0 32px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--sand);padding:10px 20px;border-radius:8px;opacity:0;transition:0.3s;z-index:1000}
#toast.show{opacity:1;bottom:40px}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 52px)}
.pane{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border2)}
.pane-body{flex:1;overflow-y:auto;padding:20px 24px}

/* Founder UI Elements */
.brand-name{font-family:var(--serif);font-size:18px;font-weight:600}
.relay-btn{background:var(--teal);color:white;border:none;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:0.2s}
.relay-btn:hover{background:var(--ink)}

/* [Existing scard, chip, and utility styles from v3.4 remain here] */

</style>
</head>

  </div>

    </div>

  <div class="pane" id="right-pane">

function scrubSensitiveData(text) {
  const patterns = [

  let clean = text.replace(patterns[0], () => {count++; return "[REDACTED_API_KEY]"});

}

function generateRelayLink() {
  if(!parsedData) return toast("Build a handoff first");
  const blob = btoa(JSON.stringify({p: parsedData.project, t: parsedData.tech}));
  const url = window.location.href.split('?')[0] + '?relay=' + blob;
  navigator.clipboard.writeText(url);
  toast("Relay link copied!");
}

</html>
